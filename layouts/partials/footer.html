<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-logo">
      <img src="{{ "images/logo-full.png" | relURL }}" alt="Rhoades &amp; Son Home Inspections" class="footer-logo-img">
    </div>
    <div class="footer-info">
      <a href="tel:{{ .Site.Params.phone }}">{{ .Site.Params.phone }}</a>
      <a href="mailto:{{ .Site.Params.email }}">{{ .Site.Params.email }}</a>
      <span>{{ .Site.Params.address }}</span>
      <span class="footer-copy">&copy; {{ now.Year }} {{ .Site.Title }}</span>
    </div>
  </div>
</footer>
